<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한자 보기 선택 게임</title>
<style>
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:18px; font-family:Arial,'Noto Sans KR',sans-serif;
  background:linear-gradient(135deg,#fff3bd,#eaf5ff); color:#12336b;
}
.app{
  width:min(980px,100%); background:white; border:4px solid #123b85; border-radius:28px;
  padding:24px; box-shadow:0 18px 40px rgba(0,0,0,.14);
}
h1{margin:0 0 12px; text-align:center; font-size:clamp(30px,5vw,56px)}
.top{display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:16px}
.pill{background:#123b85;color:white;border-radius:999px;padding:10px 18px;font-weight:900;font-size:18px}
.quiz{
  text-align:center; background:#fff3aa; border:3px dashed #f0a400; border-radius:24px; padding:20px; margin-bottom:18px;
}
.label{font-weight:900;font-size:20px}
.reading{font-size:clamp(42px,8vw,86px); font-weight:900; color:#df4d28; margin:8px 0}
button{border:none; cursor:pointer; font-weight:900}
.controls{display:flex; justify-content:center; gap:10px; flex-wrap:wrap}
.ctrl{background:#123b85;color:white;border-radius:16px;padding:13px 18px;font-size:18px}
.ctrl.green{background:#238443} .ctrl.gray{background:#777}
.choices{
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px;
}
.choice{
  aspect-ratio:1.25/1; border:4px solid #123b85; border-radius:24px; background:#fff;
  font-size:clamp(58px,12vw,120px); color:#111; box-shadow:0 7px 0 #bfd0ee;
  transition:.08s;
}
.choice:hover{transform:translateY(-3px); background:#eef6ff}
.choice.correct{background:#caffd1;border-color:#21a642}
.choice.wrong{background:#ffd4d4;border-color:#e23b3b}
.msg{min-height:38px;text-align:center;font-size:25px;font-weight:900;margin-top:16px}
.small{text-align:center;color:#607088;font-weight:700;margin-top:10px}
@media(max-width:700px){.choices{grid-template-columns:repeat(2,1fr)} .app{padding:16px}}
</style>
</head>
<body>
<div class="app">
  <h1>⭐ 훈음 듣고 한자 고르기</h1>
  <div class="top">
    <div class="pill">점수 <span id="score">0</span></div>
    <div class="pill">문제 <span id="qnum">1</span> / 40</div>
  </div>
  <section class="quiz">
    <div class="label">이 훈음에 맞는 한자를 클릭!</div>
    <div id="reading" class="reading">노래 가</div>
    <div class="controls">
      <button class="ctrl green" onclick="speakCurrent()">🔊 훈음 듣기</button>
      <button class="ctrl" onclick="nextQuestion()">➡️ 다음</button>
      <button class="ctrl gray" onclick="restart()">처음부터</button>
    </div>
  </section>
  <div class="choices" id="choices"></div>
  <div class="msg" id="msg"></div>
  <div class="small">보기는 한자만 나옵니다. 정답 후 자동으로 다음 문제로 넘어갑니다.</div>
</div>

<script>
const DATA = [["歌", "노래 가"], ["家", "집 가"], ["間", "사이 간"], ["車", "수레 거"], ["巾", "수건 건"], ["古", "예 고"], ["空", "빌 공"], ["教", "가르칠 교"], ["校", "학교 교"], ["國", "나라 국"], ["軍", "군사 군"], ["今", "이제 금"], ["記", "기록할 기"], ["氣", "기운 기"], ["己", "몸 기"], ["農", "농사 농"], ["答", "대답 답"], ["代", "대신할 대"], ["大", "큰 대"], ["道", "길 도"], ["洞", "골 동"], ["登", "오를 등"], ["來", "올 래"], ["老", "늙을 로"], ["里", "마을 리"], ["林", "수풀 림"], ["馬", "말 마"], ["萬", "일만 만"], ["末", "끝 말"], ["每", "매양 매"], ["面", "낯 면"], ["問", "물을 문"], ["物", "물건 물"], ["民", "백성 민"], ["本", "근본 본"], ["不", "아니 불"], ["分", "나눌 분"], ["士", "선비 사"], ["事", "일 사"], ["色", "빛 색"]];
let pool=[], current=null, score=0, qnum=1, locked=false;

function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}

function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=.78; u.pitch=1.05;
  speechSynthesis.speak(u);
}

function speakCurrent(){ if(current) speak(current[1]); }

function makeChoices(){
  const wrongs = shuffle(DATA.filter(x=>x[0]!==current[0])).slice(0,5);
  return shuffle([current, ...wrongs]);
}

function renderQuestion(){
  locked=false;
  document.getElementById('reading').textContent=current[1];
  document.getElementById('qnum').textContent=qnum;
  document.getElementById('msg').textContent='';
  const box=document.getElementById('choices');
  box.innerHTML='';
  makeChoices().forEach(item=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=item[0];
    b.onclick=()=>check(b,item);
    box.appendChild(b);
  });
  setTimeout(speakCurrent,300);
}

function check(btn,item){
  if(locked) return;
  if(item[0]===current[0]){
    locked=true;
    btn.classList.add('correct');
    score+=10;
    document.getElementById('score').textContent=score;
    document.getElementById('msg').textContent='정답! ' + current[0] + ' = ' + current[1];
    setTimeout(nextQuestion,900);
  } else {
    btn.classList.add('wrong');
    document.getElementById('msg').textContent='다시 찾아보세요!';
    speak('다시 찾아보세요');
  }
}

function nextQuestion(){
  if(pool.length===0){
    current=null;
    document.getElementById('reading').textContent='게임 완료!';
    document.getElementById('choices').innerHTML='';
    document.getElementById('msg').textContent='🎉 최종 점수: '+score+'점';
    return;
  }
  current=pool.shift();
  renderQuestion();
  qnum++;
}

function restart(){
  pool=shuffle(DATA);
  score=0; qnum=1;
  document.getElementById('score').textContent=score;
  nextQuestion();
}
restart();
</script>
</body>
</html>
